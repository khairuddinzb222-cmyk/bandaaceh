<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman Kelulusan SMP Kartika XIV-1 Banda Aceh</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Open Sans', sans-serif;
    background: linear-gradient(135deg, #0A3D0A, #1E4D1E);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
.container {
    max-width: 600px;
    width: 100%;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
  }
.header {
    background: #0A3D0A;
    color: #fff;
    text-align: center;
    padding: 40px 30px;
    border-bottom: 5px solid #C9A227;
  }
.header h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 28px;
    margin-bottom: 10px;
  }
.content { padding: 40px 30px; }
  #login-form input {
    width: 100%;
    padding: 15px;
    font-size: 16px;
    border: 2px solid #ddd;
    border-radius: 10px;
    margin-bottom: 15px;
    outline: none;
  }
  #login-form input:focus { border-color: #0A3D0A; }
  #login-form button {
    width: 100%;
    padding: 15px;
    background: #C9A227;
    color: #0A3D0A;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
.error {
    color: #d32f2f;
    background: #ffebee;
    padding: 12px;
    border-radius: 8px;
    margin-top: 15px;
    display: none;
  }
  #hasil { display: none; text-align: center; }
.status {
    font-size: 42px;
    font-weight: 800;
    margin: 20px 0;
    padding: 30px;
    border-radius: 15px;
  }
.lulus {
    background: #e8f5e9;
    color: #2e7d32;
    border: 3px solid #2e7d32;
  }
.nama-siswa {
    font-family: 'Montserrat', sans-serif;
    font-size: 24px;
    color: #0A3D0A;
    margin-bottom: 10px;
  }
.info {
    color: #666;
    font-size: 16px;
    margin-top: 20px;
  }
.btn-logout {
    margin-top: 30px;
    padding: 12px 30px;
    background: #f5f5f5;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
  }
.footer {
    text-align: center;
    padding: 20px;
    color: #999;
    font-size: 13px;
    border-top: 1px solid #eee;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Pengumuman Kelulusan</h1>
    <p>SMP Kartika XIV-1 Banda Aceh<br>Tahun Ajaran 2025/2026</p>
  </div>

  <div class="content">
    <div id="login-form">
      <p style="margin-bottom: 20px; text-align: center; color: #666;">
        Masukkan NIS dan Kata Sandi yang diberikan oleh wali kelas
      </p>
      <input type="text" id="nis" placeholder="Masukkan NIS" autocomplete="off">
      <input type="password" id="password" placeholder="Masukkan Kata Sandi">
      <button onclick="cekKelulusan()">Lihat Hasil</button>
      <div class="error" id="error">NIS atau Kata Sandi salah!</div>
    </div>

    <div id="hasil">
      <div class="nama-siswa" id="nama-siswa"></div>
      <div class="status lulus" id="status-kelulusan">LULUS</div>
      <div class="info" id="info-tambahan"></div>
      <button class="btn-logout" onclick="logout()">Cek NIS Lain</button>
    </div>
  </div>

  <div class="footer">
    © 2026 SMP Kartika XIV-1 Banda Aceh
  </div>
</div>

function cekKelulusan() {
  const nis = document.getElementById('nis').value.trim();
  const password = document.getElementById('password').value.trim();
  const error = document.getElementById('error');

  if (dataSiswa[nis] && dataSiswa[nis].password === password) {
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('hasil').style.display = 'block';
    document.getElementById('nama-siswa').textContent = dataSiswa[nis].nama;
    document.getElementById('info-tambahan').textContent = dataSiswa[nis].keterangan;
    error.style.display = 'none';
  } else {
    error.style.display = 'block';
  }
}

function logout() {
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('hasil').style.display = 'none';
  document.getElementById('nis').value = '';
  document.getElementById('password').value = '';
}

document.getElementById('password').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') cekKelulusan();
});
</script>
